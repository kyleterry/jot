name: CI

on:
  push:
  pull_request:

jobs:
  generate:
    name: Generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Generate templ
        run: go run -mod=mod github.com/a-h/templ/cmd/templ generate

      - name: Generate wire
        run: go run -mod=mod github.com/google/wire/cmd/wire ./pkg/cmd/server/

      - name: Check for uncommitted changes
        run: |
          if ! git diff --exit-code; then
            echo "Generated files are out of date. Run 'templ generate' and 'wire' and commit the results."
            exit 1
          fi

  vet:
    name: Vet
    runs-on: ubuntu-latest
    needs: generate
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: generate
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...
